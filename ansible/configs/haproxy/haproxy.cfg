global
    log /dev/log    local0
    log /dev/log    local1 notice
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon
    maxconn 10000

    ca-base /etc/ssl/certs
    crt-base /etc/ssl/private

    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options prefer-client-ciphers no-sslv3 no-tlsv10 no-tlsv11 no-tls-tickets

defaults
    log    global
    mode    http
    option    httplog
    option    dontlognull
    timeout connect 5000
    timeout client  50000
    timeout server  50000

listen  stats
    bind 127.0.0.1:81

    mode            http
    log             global

    maxconn 10

    timeout client      100s
    timeout server      100s
    timeout queue   100s

    stats enable
    stats hide-version
    stats refresh 30s
    stats show-node
    stats show-legends
    stats auth admin:admin
    stats uri  /stats

resolvers docker_dns
    nameserver dns1 127.0.0.11:53
    resolve_retries 3
    timeout retry 1s
    hold valid 10s

frontend main_http
    bind *:80
    bind *:443 ssl crt /etc/haproxy/certs/internal.pem
    mode http
    maxconn 10000

    http-request set-header X-Forwarded-Proto https if { ssl_fc }
    http-request set-header X-Forwarded-Proto http if !{ ssl_fc }
    http-request set-header X-Forwarded-Port 443 if { ssl_fc }
    http-request set-header X-Forwarded-Port 80 if !{ ssl_fc }
    http-request set-header X-SSL %[ssl_fc]
    
    timeout client 30000
    timeout client-fin 30000
    option httplog
    option dontlognull
    option httpclose
    option forwardfor
    capture request header Host len 200

    acl forbidden_src src 0.0.0.0/7 244.0.0.0/3
    http-request deny if forbidden_src
    
    stick-table type ip size 100k expire 30s store http_req_rate(10s),conn_cur
    http-request track-sc0 src
    http-request deny deny_status 429 if { sc_http_req_rate(0) gt 1000 }

    acl forbidden_uris url_reg -i .*(\.|%2e)(\.|%2e)(%2f|%5c|/|\\\\)
    acl forbidden_uris url_sub -i %00 <script xmlrpc.php
    acl forbidden_uris path_end -i /root.exe /cmd.exe /default.ida /awstats.pl .asp /phpinfo.php /id_rsa /wlwmanifest.xml .dll .sql .env 
    acl forbidden_uris path_dir -i chat main.php read_dump.php viewtopic.php phpbb sumthin horde _vti_bin MSOffice
    acl forbidden_uris url_reg -i (\.php\?temppath=|\.php\?setmodules=|[=:]http://)
    http-request deny if forbidden_uris

    http-response set-header X-Frame-Options SAMEORIGIN
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header Referrer-Policy strict-origin-when-cross-origin
    http-response set-header Permissions-Policy "geolocation=(), microphone=(), camera=()"
    http-response set-header Strict-Transport-Security "max-age=63072000; includeSubDomains"

    acl is_jellyfin hdr_beg(host) -i jellyfin.
    acl is_dashboard hdr_beg(host) -i home.
    acl is_seerr hdr_beg(host) -i seerr.
    acl is_sonarr hdr_beg(host) -i sonarr.
    acl is_radarr hdr_beg(host) -i radarr.
    acl is_prowlarr hdr_beg(host) -i prowlarr.
    acl is_bazarr hdr_beg(host) -i bazarr.
    acl is_anilist hdr_beg(host) -i go.anilist.
    acl is_forgejo hdr_beg(host) -i forgejo.
    acl is_qbit hdr_beg(host) -i torrent.
    acl is_pluto hdr_beg(host) -i pluto.
    acl is_readeck hdr_beg(host) -i readeck.

    use_backend jellyfin if is_jellyfin
    use_backend home if is_dashboard
    use_backend seerr if is_seerr
    use_backend sonarr if is_sonarr
    use_backend radarr if is_radarr
    use_backend prowlarr if is_prowlarr
    use_backend bazarr if is_bazarr
    use_backend anilist if is_anilist
    use_backend forgejo if is_forgejo
    use_backend qbit if is_qbit
    use_backend pluto if is_pluto
    use_backend readeck if is_readeck

    default_backend home

backend jellyfin
    server back 192.168.0.21:8096 check 

backend home
    server back 192.168.0.22:3000 check 

backend seerr
    server back 192.168.0.21:5055 check 

backend sonarr
    server back 192.168.0.21:8989 check 

backend radarr
    server back 192.168.0.21:7878 check 

backend prowlarr
    server back 192.168.0.21:9696 check 

backend bazarr
    server back 192.168.0.21:6767 check 

backend anilist
    server back 192.168.0.22:8080 check 

backend forgejo
    server back 192.168.0.22:3001 check 

backend qbit
    server back 192.168.0.21:58080 check 

backend pluto
    server back 192.168.0.22:3002 check

backend readeck
    server back 192.168.0.22:8000 check 
