all:
  children:
    oracle:
      hosts:
        oracle_vm:
          ansible_host: "{{ lookup('env', 'ORACLE_VM_IP') }}"
          ansible_user: "{{ lookup('env', 'ORACLE_VM_USER') | default('ubuntu', true) }}"
          ansible_ssh_private_key_file: "{{ lookup('env', 'ORACLE_VM_KEY') | default('~/.ssh/id_rsa', true) }}"
