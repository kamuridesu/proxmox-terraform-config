---
- name: Install Wireguard and iptables
  become: true
  ansible.builtin.apt:
    name:
      - wireguard
      - wireguard-tools
      - iptables
    state: present
    update_cache: true

- name: Check if private key exists
  become: true
  ansible.builtin.stat:
    path: /etc/wireguard/private.key
  register: wg_priv_key_file

- name: Generate wireguard private key
  become: true
  ansible.builtin.shell: wg genkey
  register: wg_new_private_key
  changed_when: false
  when: not wg_priv_key_file.stat.exists

- name: Save private key
  become: true
  ansible.builtin.copy:
    content: "{{ wg_new_private_key.stdout }}\n"
    dest: /etc/wireguard/private.key
    mode: "0600"
  when: not wg_priv_key_file.stat.exists

- name: Read private key
  become: true
  ansible.builtin.command: cat /etc/wireguard/private.key
  register: wg_private_key
  changed_when: false

- name: Generate and register public key
  become: true
  ansible.builtin.shell: echo "{{ wg_private_key.stdout }}" | wg pubkey
  register: wg_public_key
  changed_when: false

- name: Enable IPv4 forwarding
  become: true
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_set: true
    state: present
    reload: true

- name: Deploy Wireguard config
  become: true
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: /etc/wireguard/wg0.conf
    mode: "0600"
  notify: Restart Wireguard

- name: Ensure wireguard is enabled and running
  become: true
  ansible.builtin.systemd:
    name: wg-quick@wg0
    state: started
    enabled: true
